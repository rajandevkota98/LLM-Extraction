# Run `pre-commit install` once after `pip install -e ".[dev]"`.
# Pipeline artifacts (outputs/, *.jsonl) are generated, not authored — keep hooks off them.
exclude: '^(outputs/|.*\.jsonl$)'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
