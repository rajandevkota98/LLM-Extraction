name: CI

on:
  push:
    branches: [main]
  pull_request:

# Nothing here writes to the repo, publishes, or reads a secret.
permissions:
  contents: read

# A new push supersedes the run it interrupted.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # Installed from the dev extra rather than a prebuilt ruff action, so CI
      # runs exactly the ruff version pinned in pyproject and cannot drift from
      # what pre-commit and local runs use.
      - name: Install
        run: pip install -e ".[dev]"

      - name: Report versions
        run: ruff --version

      # --output-format=github annotates the offending lines in the diff.
      - name: Lint
        run: ruff check --output-format=github .

      - name: Format
        run: ruff format --check --diff .

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      # The suite makes no network calls and reads no API keys, so it needs no
      # secrets. Deliberately so: a job that depends on a provider being up
      # fails for reasons that have nothing to do with the commit.
      - name: Test
        run: pytest -q
